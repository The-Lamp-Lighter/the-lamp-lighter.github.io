<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunarium's Lab</title>
    <style>
        :root { --main-color: #00ff88; --bg-card: rgba(0, 0, 0, 0.8); }
        body {
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80');
            background-size: cover;          /* Faz a imagem cobrir tudo */
            background-position: center;     /* Centraliza a imagem */
            background-attachment: fixed;    /* A imagem não rola com a página */
            background-repeat: no-repeat;
            margin: 0;
            min-height: 100vh;               /* Força o fundo a ter no mínimo a altura da tela */
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .nav-bar { margin-bottom: 20px; }
        .nav-btn {
            background: transparent; border: 1px solid var(--main-color);
            color: var(--main-color); padding: 10px 20px; cursor: pointer; margin: 5px;
            border-radius: 5px; transition: 0.3s;
        }
        .nav-btn:hover { background: var(--main-color); color: black; }

        .content-section {
            display: none; /* Esconde as seções inicialmente */
            background: var(--bg-card); padding: 30px; border-radius: 15px;
            width: 90%; max-width: 600px; backdrop-filter: blur(10px);
        }
        .active { display: block; } /* Mostra a seção ativa */

        .project-card {
            border-left: 4px solid var(--main-color);
            background: rgba(255,255,255,0.05);
            padding: 15px; margin: 10px 0; border-radius: 0 10px 10px 0;
        }
        .download-btn {
            display: inline-block; background: var(--main-color);
            color: black; padding: 5px 15px; text-decoration: none;
            border-radius: 5px; font-weight: bold; font-size: 0.9em;
        }
    </style>
</head>
<body>

    <h1>Lunarium's Lab</h1>

    <div class="nav-bar">
        <button class="nav-btn" onclick="openTab('home')">Início</button>
        <button class="nav-btn" onclick="openTab('scripts')">Scripts (.py)</button>
        <button class="nav-btn" onclick="openTab('apps')">Apps (.exe)</button>
    </div>

    <div id="home" class="content-section active">
        <h2>Bem-vindo!</h2>
        <p>Este site á para guardar meus projetos e aprendizados</p>
    </div>

    <div id="scripts" class="content-section">
        <h2>Scripts Python</h2>
        <div class="project-card">
            <h3>🔔 Notificador de Água</h3>
            <p>Um lembrete desktop simples usando Plyer.</p>
            <a href="scripts/notificador.py" class="download-btn" download>Baixar .py</a>
        </div>
    </div>

    <div id="apps" class="content-section">
        <div class="project-card">
            <h3>Organizador de arquivos</h3>
            <p>Versão: V.1</p>
            <p>OS: Windows</p>
            <a href="Organizador de Arquivos.zip" class="download-btn" download>Baixar</a>
        </div>
    </div>

    <script>
        function openTab(tabName) {
            var i;
            var x = document.getElementsByClassName("content-section");
            for (i = 0; i < x.length; i++) {
                x[i].style.display = "none";  
            }
            document.getElementById(tabName).style.display = "block";  
        }
    </script>

</body>
</html>
