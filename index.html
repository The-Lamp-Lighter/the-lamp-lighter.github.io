<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Projetos Python</title>
    <style>
        body {
            /* Substituiremos o link abaixo pela sua imagem depois! */
            background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://pixabay.com/pt/images/download/meineresterampe-music-cassette-697635_1920.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px); /* Efeito de vidro embaçado */
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        h1 { color: #00ff88; }
        .btn {
            display: inline-block;
            background: #00ff88;
            color: #121212;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover { background: #00cc6e; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <h1>the-lamp-lighter</h1>
        <p>Aprendiz de linguagens</p>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 20px 0;">
        <h3>Meu espaço</h3>
        <p>Notificador de Água: Um script simples para manter a saúde em dia enquanto programa.</p>
        <a href="#" class="btn">Ver no GitHub</a>
    </div>
</body>
</html>
